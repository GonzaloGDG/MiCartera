
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartera de Valores — Login</title>
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="login-wrapper">

    <!-- Logo / Cabecera -->
    <div class="login-header">
      <div class="logo">
        <span class="logo-icon">📈</span>
        <span class="logo-text">CarteraApp</span>
      </div>
      <p class="login-subtitle">Gestiona tu cartera de valores</p>
    </div>

    <!-- Tarjeta de login -->
    <div class="login-card">
      <h2 class="login-title">Iniciar sesión</h2>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Tu usuario"
              autocomplete="username"
              required
            />
          </div>
          <span class="field-error" id="usernameError"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Tu contraseña"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" title="Mostrar/ocultar">👁️</button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Mensaje de error global -->
        <div class="alert alert-error" id="loginError" style="display:none;"></div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" id="btnSpinner" style="display:none;">⏳</span>
        </button>

      </form>
    </div>

    <p class="login-footer">© 2024 CarteraApp — Solo para uso personal</p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
