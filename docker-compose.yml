version: '3.8'
services:

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persistencia real
    ports:
      - "5432:5432"   # opcional, para conectarte con DBeaver/pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_python
    env_file: .env
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy   # espera a que Postgres esté listo

  frontend:
    build: ./frontend
    container_name: frontend_html
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:   # volumen nombrado → los datos sobreviven al docker compose down
