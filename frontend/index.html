<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App con PostgreSQL</title>
</head>
<body>
    <h1>Mensajes guardados en PostgreSQL</h1>

    <input type="text" id="nuevo" placeholder="Escribe un mensaje..." />
    <button onclick="enviar()">Guardar</button>

    <ul id="lista"></ul>

    <script>
        const API = "http://localhost:5000/api";

        async function cargar() {
            const res = await fetch(`${API}/mensajes`);
            const data = await res.json();
            const lista = document.getElementById("lista");
            lista.innerHTML = data.map(m =>
                `<li><b>#${m.id}</b> ${m.texto} <small>(${m.fecha})</small></li>`
            ).join("");
        }

        async function enviar() {
            const texto = document.getElementById("nuevo").value;
            await fetch(`${API}/mensajes`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texto })
            });
            document.getElementById("nuevo").value = "";
            cargar();
        }

        cargar();
    </script>
</body>
</html>
